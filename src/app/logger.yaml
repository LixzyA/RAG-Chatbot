# Logging configuration — single source of truth for handlers, formatters,
# and per-handler / per-logger levels. Resolved by utils/logger.setup_logging()
# at app startup (called from main.py).
#
# Runtime path overrides (e.g. `log_dir`) live in src/app/config.py as
# Settings fields and are injected into `handlers[*].filename` paths at the
# moment setup_logging() loads this file — see utils/logger.py for the bridge.
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)d in %(funcName)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    (): app.utils.logger.JSONFormatter
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: app.jsonl
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

loggers:
  uvicorn:
    handlers: [console, file]
    level: INFO
    
  transformers:
    level: ERROR  
root:
  level: INFO
  handlers: [console, file]
